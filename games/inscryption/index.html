<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Inscryption Webport</title>

    <style>
      body {
        margin: 0;
        background: #0f0f10;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #unity-canvas {
        width: 960px;
        height: 600px;
        display: block;
        margin: auto;
        background: #231F20;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0b0b0c;
      }

      #text {
        font-size: 13px;
        text-align: center;
      }

      #slider {
        width: 420px;
        accent-color: #7c5cff;
      }

      #fsBtn {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        background: #1a1a1d;
        color: #e6e6e6;
        border: 1px solid #333;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 6px;
      }

      #fsBtn:hover {
        background: #242428;
      }
    </style>
  </head>

  <body>
    <button id="fsBtn">Fullscreen</button>

    <div id="loader">
      <div id="text">Downloading...</div>
      <input id="slider" type="range" min="0" max="100" value="0" disabled>
    </div>

    <canvas id="unity-canvas"></canvas>

    <script src="Build/7a2dbded24d57e056180125b1583e7c4.loader.js"></script>

    <script>
      const state = {
        total: 0,
        loaded: 0,
        done: false
      }
      const EXPECTED_DATA_TOTAL_BYTES = 1448 * 1048576
      const DATA_DOWNLOAD_CONCURRENCY = 8

      function mb(v) {
        return v / 1048576
      }

      function render() {
        const percent = state.total ? (state.loaded / state.total) * 100 : 0

        document.getElementById("slider").value = percent

        const text = document.getElementById("text")

        if (state.done) {
          text.textContent =
            "Download complete (" + mb(state.total).toFixed(2) + " MB)"
          return
        }

        text.textContent =
          "Downloading: " +
          mb(state.loaded).toFixed(2) + " MB of " +
          mb(state.total || state.loaded).toFixed(2) + " MB (" +
          percent.toFixed(1) + "%)"
      }

      const nativeFetch = window.fetch

      async function fetchByKnownParts(partUrls, contentType, trackProgress) {
        const chunks = []
        let loadedBytes = 0

        if (trackProgress) {
          state.total = 0
          state.loaded = 0
          state.done = false
          render()
        }

        for (const partUrl of partUrls) {
          const res = await nativeFetch(partUrl)
          if (!res.ok) {
            throw new Error("Missing chunk: " + partUrl)
          }

          const buf = await res.arrayBuffer()
          chunks.push(buf)
          loadedBytes += buf.byteLength

          if (trackProgress) {
            state.total = loadedBytes
            state.loaded = loadedBytes
            render()
          }
        }

        if (trackProgress) {
          state.done = true
          render()
        }

        const blob = new Blob(chunks, contentType ? { type: contentType } : {})
        return new Response(blob, {
          status: 200,
          headers: contentType ? { "Content-Type": contentType } : {}
        })
      }

      function suffixFromIndex(index) {
        const alphabet = "abcdefghijklmnopqrstuvwxyz"
        const first = Math.floor(index / alphabet.length)
        const second = index % alphabet.length
        return alphabet[first] + alphabet[second]
      }

      async function fetchByAlphabetParts(base, trackProgress) {
        const alphabet = "abcdefghijklmnopqrstuvwxyz"
        const maxParts = alphabet.length * alphabet.length
        const chunks = new Array(maxParts)
        let loadedBytes = 0
        let nextIndex = 0
        let stopIndex = maxParts

        if (trackProgress) {
          state.total = EXPECTED_DATA_TOTAL_BYTES
          state.loaded = 0
          state.done = false
          render()
        }

        async function worker() {
          while (true) {
            const partIndex = nextIndex
            nextIndex += 1

            if (partIndex >= stopIndex) {
              return
            }

            const suffix = suffixFromIndex(partIndex)
            const partUrl = base + suffix
            const res = await nativeFetch(partUrl)

            if (!res.ok) {
              if (partIndex < stopIndex) {
                stopIndex = partIndex
              }
              continue
            }

            const buf = await res.arrayBuffer()
            chunks[partIndex] = buf
            loadedBytes += buf.byteLength

            if (trackProgress) {
              state.loaded = Math.min(EXPECTED_DATA_TOTAL_BYTES, loadedBytes)
              render()
            }
          }
        }

        const workers = []
        const workerCount = Math.min(DATA_DOWNLOAD_CONCURRENCY, maxParts)
        for (let i = 0; i < workerCount; i++) {
          workers.push(worker())
        }
        await Promise.all(workers)

        const orderedChunks = []
        for (let i = 0; i < stopIndex; i++) {
          if (!chunks[i]) {
            throw new Error("Missing data chunk at index " + i)
          }
          orderedChunks.push(chunks[i])
        }

        if (trackProgress) {
          state.total = EXPECTED_DATA_TOTAL_BYTES
          state.loaded = EXPECTED_DATA_TOTAL_BYTES
          state.done = true
          render()
        }

        const blob = new Blob(orderedChunks)
        return new Response(blob, { status: 200 })
      }

      window.fetch = async function(input, init) {
        const url = typeof input === "string" ? input : input.url

        if (url.includes("473b9593aa93436d0dfd3c30217f126b.data")) {
          return fetchByAlphabetParts("Build/473b9593aa93436d0dfd3c30217f126b.data.part_", true)
        }

        if (url.includes("2a21aa2df9743ada0aa5cac7d789934d.wasm")) {
          return fetchByKnownParts([
            "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part_00",
            "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part_01",
            "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part_02",
            "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part_03",
            "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm.part_04"
          ], "application/wasm", false)
        }

        return nativeFetch(input, init)
      }

      const canvas = document.getElementById("unity-canvas")

      document.getElementById("fsBtn").onclick = function() {
        if (canvas.requestFullscreen) canvas.requestFullscreen()
        else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen()
        else if (canvas.mozRequestFullScreen) canvas.mozRequestFullScreen()
        else if (canvas.msRequestFullscreen) canvas.msRequestFullscreen()
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta")
        meta.name = "viewport"
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no"
        document.head.appendChild(meta)

        canvas.style.width = "100%"
        canvas.style.height = "100%"
        canvas.style.position = "fixed"
      }

      createUnityInstance(canvas, {
        dataUrl: "Build/473b9593aa93436d0dfd3c30217f126b.data",
        frameworkUrl: "Build/7492dd364cd7595cfa9d018ad373b295.framework.js",
        codeUrl: "Build/2a21aa2df9743ada0aa5cac7d789934d.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Daniel Mullins Games",
        productName: "Inscryption",
        productVersion: "Release"
      }).then(() => {
        document.getElementById("loader").style.display = "none"
      })
    </script>
  </body>
</html>
